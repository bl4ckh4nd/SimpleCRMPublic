name: Build and Publish Electron App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog entry for this version
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG"
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          body: ${{ steps.changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=hoisted

      - name: Ensure tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag ref: $TAG"
          echo "package.json version: $PKG_VERSION"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "❌ Tag ($TAG) does not match package.json version (v$PKG_VERSION)"
            exit 1
          fi
          echo "✅ Tag matches package.json version"

      - name: Build and publish Electron app (Windows)
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run electron:publish

  build-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --node-linker=hoisted

      - name: Ensure tag matches package.json version
        run: |
          TAG="${GITHUB_REF##*/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag ref: $TAG"
          echo "package.json version: $PKG_VERSION"
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "❌ Tag ($TAG) does not match package.json version (v$PKG_VERSION)"
            exit 1
          fi
          echo "✅ Tag matches package.json version"

      - name: Build and publish Electron app (macOS)
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run electron:publish

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
