name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version increment
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --node-linker=hoisted
      - id: release
        name: Prepare version and changelog
        shell: bash
        run: |
          VERSION=$(node scripts/prepare-release.mjs "${{ inputs.release_type }}" --notes-file release-notes.md)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "## Preparing v$VERSION" >> "$GITHUB_STEP_SUMMARY"
      - run: pnpm run release:test
      - run: pnpm run lint
      - run: pnpm test -- --runInBand
      - run: pnpm run typecheck
      - run: pnpm run build
      - uses: actions/upload-artifact@v6
        with:
          name: release-metadata
          path: |
            package.json
            CHANGELOG.md
            release-notes.md
          if-no-files-found: error

  windows:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: release-metadata
          path: release-metadata
      - shell: pwsh
        run: Copy-Item release-metadata/package.json package.json -Force
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --node-linker=hoisted --ignore-scripts
      - name: Prepare Electron and native dependency patch
        run: |
          node node_modules/electron/install.js
          node scripts/patch-better-sqlite3.js
      - run: pnpm run build
      - name: Package Windows x64
        env:
          NODE_ENV: production
        run: pnpm exec electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: |
            dist-build/*.exe
            dist-build/*.blockmap
            dist-build/latest*.yml
          if-no-files-found: error

  macos:
    needs: prepare
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: release-metadata
          path: release-metadata
      - run: cp release-metadata/package.json package.json
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --node-linker=hoisted
      - run: pnpm run build
      - name: Package macOS x64 and arm64
        env:
          NODE_ENV: production
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac dmg zip --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: |
            dist-build/*.dmg
            dist-build/*.zip
            dist-build/*.blockmap
            dist-build/latest*.yml
          if-no-files-found: error

  linux:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: release-metadata
          path: release-metadata
      - run: cp release-metadata/package.json package.json
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: pnpm install --frozen-lockfile --node-linker=hoisted
      - run: pnpm run build
      - name: Package Linux x64
        env:
          NODE_ENV: production
        run: pnpm exec electron-builder --linux AppImage --x64 --publish never
      - uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: |
            dist-build/*.AppImage
            dist-build/*.blockmap
            dist-build/latest*.yml
          if-no-files-found: error

  publish:
    needs: [prepare, windows, macos, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v6
        with:
          name: release-metadata
          path: release-metadata
      - uses: actions/download-artifact@v6
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Validate and checksum release assets
        shell: bash
        run: |
          find release-assets -type f \( -name 'package.json' -o -name 'CHANGELOG.md' -o -name 'release-notes.md' \) -delete
          find release-assets -type f -name '*.exe' -print -quit | grep -q .
          test "$(find release-assets -type f -name '*.dmg' | wc -l)" -eq 2
          test "$(find release-assets -type f -name '*.zip' | wc -l)" -eq 2
          find release-assets -type f -name '*.AppImage' -print -quit | grep -q .
          test "$(find release-assets -type f -name 'latest*.yml' | wc -l)" -ge 3
          (cd release-assets && find . -type f -print0 | sort -z | xargs -0 sha256sum) > release-assets/SHA256SUMS.txt
      - name: Commit and tag release
        shell: bash
        run: |
          TAG="v$VERSION"
          git fetch origin main --tags
          REMOTE_SHA=$(git rev-parse origin/main)
          if [ "$REMOTE_SHA" = "$GITHUB_SHA" ]; then
            cp release-metadata/package.json package.json
            cp release-metadata/CHANGELOG.md CHANGELOG.md
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add package.json CHANGELOG.md
            git diff --cached --quiet && { echo 'Release metadata made no changes'; exit 1; }
            git commit -m "chore(release): $TAG"
            git tag -a "$TAG" -m "Release $TAG"
            git push --atomic origin HEAD:main "$TAG"
          else
            REMOTE_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
            test "$REMOTE_VERSION" = "$VERSION"
            test "$(git rev-list -n 1 "$TAG")" = "$REMOTE_SHA"
            git show origin/main:CHANGELOG.md > /tmp/remote-changelog.md
            cmp release-metadata/CHANGELOG.md /tmp/remote-changelog.md
          fi
      - name: Create or resume GitHub Release
        shell: bash
        run: |
          TAG="v$VERSION"
          mapfile -d '' ASSETS < <(find release-assets -type f -print0)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" --title "$TAG" --notes-file release-metadata/release-notes.md --draft=false
          else
            gh release create "$TAG" "${ASSETS[@]}" --verify-tag --title "$TAG" --notes-file release-metadata/release-notes.md
          fi
          URL=$(gh release view "$TAG" --json url --jq .url)
          echo "## Published [$TAG]($URL)" >> "$GITHUB_STEP_SUMMARY"
          find release-assets -type f -printf -- '- `%f`\n' | sort >> "$GITHUB_STEP_SUMMARY"
